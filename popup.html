<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>edge-font</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>edge-font</h1>
    <p id="host" class="host"></p>
  </header>

  <label class="toggle">
    <input type="checkbox" id="enabled">
    <span data-i18n="enableForSite">Enable for this website</span>
  </label>

  <label class="field" id="font-field" hidden>
    <span data-i18n="fontLabel">Font</span>
    <select id="font-select"></select>
  </label>

  <label class="field" id="custom-field" hidden>
    <span data-i18n="customFontLabel">Custom font</span>
    <input type="text" id="custom-font" data-i18n-placeholder="customFontPlaceholder" placeholder="e.g. Roboto" autocomplete="off" spellcheck="false">
  </label>

  <script src="popup.js"></script>
</body>
</html>
